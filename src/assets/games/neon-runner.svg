  <rect x="450" y="464" width="300" height="38" rx="19" class="pil"/>
  <text x="600" y="487" font-size="16" text-anchor="middle" class="ptx">vibecode.game</text>
  <path d="M 36 60 L 36 36 L 60 36" class="cor"/>
